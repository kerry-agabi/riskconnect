name: ci

on:
  pull_request:
  push:
    branches:
      - main

env:
  STACK_NAME: ${{ vars.STACK_NAME || 'mrisk' }}

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: ruff check .
      - run: mypy src
      - run: pytest

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t ${{ env.STACK_NAME }}-frontend:ci frontend
      - run: docker build -t ${{ env.STACK_NAME }}-backend:ci backend

  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform/dev
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false
      - run: python ../../scripts/package_lambdas.py
      - run: terraform fmt -check -recursive ..
      - run: terraform init -backend=false -input=false
      - run: terraform validate -no-color
      - run: terraform -chdir=../bootstrap init -backend=false -input=false
      - run: terraform -chdir=../bootstrap validate -no-color
